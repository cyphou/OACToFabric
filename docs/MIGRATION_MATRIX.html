.card.yellow .num { color: var(--yellow); }
.card.orange .num { color: var(--orange); }
.card.red .num { color: var(--red); }

.filters { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
.filters label { color: var(--muted); font-size: .85rem; }
.filters select, .filters input {
  background: var(--surface); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: .4rem .6rem; font-size: .85rem; }

.section { margin-bottom: 2.5rem; }
.section h2 { font-size: 1.2rem; margin-bottom: .75rem; padding-bottom: .4rem;
              border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .5rem; }
.section h2 .badge { font-size: .75rem; background: var(--border); padding: .15rem .5rem;
                     border-radius: 10px; color: var(--muted); font-weight: 400; }
table { width: 100%; border-collapse: collapse; font-size: .85rem; }
th { text-align: left; padding: .6rem .8rem; background: var(--surface); color: var(--muted);
     border-bottom: 2px solid var(--border); position: sticky; top: 0; cursor: pointer; white-space: nowrap; }
th:hover { color: var(--accent); }
td { padding: .55rem .8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:hover td { background: rgba(88,166,255,.04); }
tr.hidden { display: none; }

.status { display: inline-block; padding: .15rem .55rem; border-radius: 10px; font-size: .75rem; font-weight: 600; }
.status.automated { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.status.partial   { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow); }
.status.manual    { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange); }
.status.unsupported { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }

.platform { font-size: .75rem; padding: .1rem .4rem; border-radius: 4px; }
.platform.oac { background: #1a1a3e; color: #a5b4fc; }
.platform.essbase { background: #1a3a2e; color: #6ee7b7; }
.platform.both { background: #2a1a3e; color: #c4b5fd; }

.agent { color: var(--accent); font-size: .8rem; }
.note { color: var(--muted); font-size: .8rem; }

footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border);

    const sc = r.status.toLowerCase().replace(/ /g,"");
    tr.innerHTML = `
      <td><span class="platform ${pc}">${r.platform}</span></td>
      <td><strong>${r.src}</strong></td>
      <td class="note">${r.desc}</td>
      <td>${r.fabric}</td>
      <td><span class="agent">${r.agent}</span></td>
      <td><span class="status ${sc}">${r.status}</span></td>
      <td class="note">${r.note}</td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  sec.appendChild(table);
  container.appendChild(sec);
});

// ── Counts ──
function updateCounts() {
  const visible = [...document.querySelectorAll("tbody tr:not(.hidden)")];
  document.getElementById("cnt-auto").textContent = visible.filter(r=>r.dataset.status==="Automated").length;
  document.getElementById("cnt-partial").textContent = visible.filter(r=>r.dataset.status==="Partial").length;
  document.getElementById("cnt-manual").textContent = visible.filter(r=>r.dataset.status==="Manual").length;
  document.getElementById("cnt-unsupported").textContent = visible.filter(r=>r.dataset.status==="Not Supported").length;
}
updateCounts();

// ── Filters ──
function applyFilters() {
  const plat = document.getElementById("filterPlatform").value;
  const stat = document.getElementById("filterStatus").value;
  const agnt = document.getElementById("filterAgent").value;
  const srch = document.getElementById("filterSearch").value.toLowerCase();
  document.querySelectorAll("tbody tr").forEach(tr => {
    let show = true;
    if (plat && tr.dataset.platform !== plat) show = false;
    if (stat && tr.dataset.status !== stat) show = false;
    if (agnt && tr.dataset.agent !== agnt) show = false;
    if (srch && !tr.textContent.toLowerCase().includes(srch)) show = false;
    tr.classList.toggle("hidden", !show);
  });
  // Hide empty sections
  document.querySelectorAll(".section").forEach(sec => {
    const rows = sec.querySelectorAll("tbody tr:not(.hidden)");
    sec.style.display = rows.length ? "" : "none";
  });
  updateCounts();
}
["filterPlatform","filterStatus","filterAgent"].forEach(id =>
  document.getElementById(id).addEventListener("change", applyFilters));
document.getElementById("filterSearch").addEventListener("input", applyFilters);

document.getElementById("gendate").textContent = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
