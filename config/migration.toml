# ==========================================================================
# OAC → Fabric & Power BI — Base Migration Configuration
# ==========================================================================
# Override per-environment via config/dev.toml, config/test.toml, config/prod.toml
# Override individual values via environment variables (see .env.example).

[migration]
environment = "dev"
output_dir = "output"
log_level = "INFO"

[scope]
include_paths = ["/shared"]
exclude_paths = ["/shared/archive", "/shared/test"]
asset_types = []           # empty = all types
# wave = 1                 # uncomment to limit to a single wave

[orchestrator]
max_retries = 3
retry_backoff_seconds = [60, 300, 900]
parallel_agents_per_wave = 3
max_items_per_wave = 50
validate_after_each_wave = true
auto_advance_waves = false
notification_channels = ["log"]

[llm]
enabled = false
model = "gpt-4"
max_tokens = 2048
temperature = 0.1
max_retries = 3
token_budget_per_run = 500_000
cache_enabled = true
